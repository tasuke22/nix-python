name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@main

      - name: Format check
        run: nix fmt -- --ci

      - name: Type check
        run: nix develop --command ty check src

      - name: Lint
        run: nix develop --command ruff check .

      - name: Test
        run: nix develop --command bash -c "uv sync --locked && uv run pytest"
